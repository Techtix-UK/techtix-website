<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Techtix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <div class="top-bar">
        <div class="container">
            <div class="top-bar-info">
                <span><i class="fas fa-envelope"></i> hello@techtixlabs.co.uk</span>
            </div>
            <div class="top-bar-info">
                <span><i class="fas fa-phone-alt"></i> UK: +44 1730 639318</span>
                <span><i class="fas fa-phone-alt"></i> SA: +27 87 822 1856</span>
            </div>
        </div>
    </div>

    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Techtix Logo">
            </a>
            <div class="hamburger">
                <i class="fas fa-bars"></i>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="divisions.html">Divisions</a></li>
                <li><a href="contact.html" class="active" style="color: var(--primary);">Contact Us</a></li>
            </ul>
        </div>
    </header>

    <div class="page-header">
        <div class="container">
            <h1>Let's Connect</h1>
            <p>Drop us a message below and our team will get back to you shortly.</p>
        </div>
    </div>

    <section class="section-padding">
        <div class="container">
            <form action="https://formspree.io/f/mbdzkbpp" method="POST">
                <div class="form-group">
                    <input type="text" name="Full Name" placeholder="Full Name" required>
                    <input type="email" name="Email Address" placeholder="Email Address" required>
                </div>
                <div class="form-group">
                    <select name="Service Requested" required>
                        <option value="" disabled selected>Which service are you interested in?</option>
                        <option value="Tech">Tech Support</option>
                        <option value="Marketing">Marketing Agency</option>
                        <option value="Web">Web Design</option>
                        <option value="Airbnb">Remote Airbnb Management</option>
                        <option value="Multiple">Multiple Services</option>
                    </select>
                </div>
                <textarea name="Message" rows="5" placeholder="How can we help you power your tomorrow?" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Techtix. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // Mobile Menu Toggle Only
        const hamburger = document.querySelector('.hamburger');
        const navLinks = document.querySelector('.nav-links');
        hamburger.addEventListener('click', () => { navLinks.classList.toggle('active'); });
    </script>
</body>
</html>
